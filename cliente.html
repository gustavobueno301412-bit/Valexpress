<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Express - Motoboy</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .header { background: #0984e3; padding: 20px; border-radius: 0 0 20px 20px; text-align: center; margin: -15px -15px 20px -15px; }
        select { width: 100%; padding: 15px; background: #222; color: #f1c40f; border: 1px solid #444; border-radius: 10px; font-size: 18px; font-weight: bold; }
        .pedido { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid #f1c40f; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; }
        .btn-status { background: #e67e22; color: white; }
        .btn-check { background: #27ae60; color: white; }
        .gps-status { font-size: 11px; text-align: center; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header"><h2>PAINEL DO MOTOBOY</h2></div>
  
    <label>QUEM É VOCÊ?</label>
    <select id="moto-nome" onchange="iniciarSessao()">
        <option value="">Selecione seu nome...</option>
    </select>

    <div id="lista" style="margin-top: 20px;"></div>
    <div id="gps-info" class="gps-status">GPS inativo. Escolha seu nome para iniciar.</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyKAjP23CNKJ6VqtmBA4ayQcp7qnMxBmmU-ItDQz4HgXOf7ZmPHcu5PWeJuXHsGv0Fskg/exec";
    let meuNome = "";

    async function carregarMoto() {
        const res = await fetch(URL_API + "?action=getConfig");
        const data = await res.json();
        document.getElementById('moto-nome').innerHTML += data.motoboys.map(m => `<option value="${m.nome}">${m.nome}</option>`).join('');
    }

    function iniciarSessao() {
        meuNome = document.getElementById('moto-nome').value;
        if (!meuNome) return;
       
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            fetch(URL_API, {
                method: 'POST',
                body: JSON.stringify({ acao: "updateGPS", nome: meuNome, lat: lat, lng: lng })
            });
            document.getElementById('gps-info').innerText = "GPS Online: Transmitindo localização...";
        }, null, { enableHighAccuracy: true });

        buscarPedidos();
        setInterval(buscarPedidos, 8000);
    }

    async function buscarPedidos() {
        if(!meuNome) return;
        const res = await fetch(URL_API + "?action=getAtivos");
        const pedidos = await res.json();
        const div = document.getElementById('lista');
        div.innerHTML = "";

        // FILTRO AJUSTADO: Agora mostra tudo que for do motoboy logado
        pedidos.filter(p => p.moto === meuNome).forEach(p => {
            div.innerHTML += `
                <div class="pedido">
                    <h2 style="margin:0; color:#f1c40f;">👤 ${p.cliente}</h2>
                    <h3 style="margin:5px 0; color:#0984e3;">📦 ${p.produto}</h3>
                    <p>📍 <b>Retirada:</b> ${p.ret}<br>🏁 <b>Entrega:</b> ${p.ent}</p>
                    <p style="background:#333; padding:5px; border-radius:5px;">Status: <b>${p.status.toUpperCase()}</b></p>
                    <button class="btn btn-status" onclick="mudarStatus(${p.id}, 'Saindo p/ Coleta')">🛵 SAINDO P/ COLETA</button>
                    <button class="btn btn-status" style="background:#9b59b6" onclick="mudarStatus(${p.id}, 'Entrega em curso')">🚀 EM ENTREGA</button>
                    <button class="btn btn-check" onclick="mudarStatus(${p.id}, 'finalizado')">✅ CONCLUÍDO</button>
                </div>
            `;
        });
    }

    async function mudarStatus(id, st) {
        await fetch(URL_API, { method: 'POST', body: JSON.stringify({ acao: "updateStatus", id, status: st }) });
        if(st === 'finalizado') {
             await fetch(URL_API, { method: 'POST', body: JSON.stringify({ acao: "finalizar", id }) });
        }
        buscarPedidos();
    }

    carregarMoto();
</script>
</body>
</html>
